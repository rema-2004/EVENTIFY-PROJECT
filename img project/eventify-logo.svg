<svg width="380" height="260" viewBox="0 0 380 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Eventify orbital network logo</title>
<desc>Central circle with letter E surrounded by an orbital network of connected dots, with the EVENTIFY wordmark below.</desc>
<defs>
<linearGradient id="gradNavyBlue" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1B1F4B"/>
<stop offset="1" stop-color="#4C4FE8"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="380" height="260" fill="#FFFFFF"/>

<circle cx="190" cy="95" r="38" fill="url(#gradNavyBlue)"/>
<text x="190" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">E</text>

<line x1="225" y1="95" x2="252" y2="95" stroke="#4C4FE8" stroke-width="1" opacity="0.6"/>
<line x1="214" y1="65" x2="221" y2="41.3" stroke="#4C4FE8" stroke-width="1" opacity="0.6"/>
<line x1="166" y1="65" x2="159" y2="41.3" stroke="#4C4FE8" stroke-width="1" opacity="0.6"/>
<line x1="155" y1="95" x2="128" y2="95" stroke="#4C4FE8" stroke-width="1" opacity="0.6"/>
<line x1="166" y1="125" x2="159" y2="148.7" stroke="#4C4FE8" stroke-width="1" opacity="0.6"/>
<line x1="214" y1="125" x2="221" y2="148.7" stroke="#4C4FE8" stroke-width="1" opacity="0.6"/>

<line x1="252" y1="95" x2="221" y2="41.3" stroke="#4C4FE8" stroke-width="0.5" opacity="0.3"/>
<line x1="221" y1="41.3" x2="159" y2="41.3" stroke="#4C4FE8" stroke-width="0.5" opacity="0.3"/>
<line x1="159" y1="41.3" x2="128" y2="95" stroke="#4C4FE8" stroke-width="0.5" opacity="0.3"/>
<line x1="128" y1="95" x2="159" y2="148.7" stroke="#4C4FE8" stroke-width="0.5" opacity="0.3"/>
<line x1="159" y1="148.7" x2="221" y2="148.7" stroke="#4C4FE8" stroke-width="0.5" opacity="0.3"/>
<line x1="221" y1="148.7" x2="252" y2="95" stroke="#4C4FE8" stroke-width="0.5" opacity="0.3"/>

<circle cx="252" cy="95" r="5" fill="#8B5CF6"/>
<circle cx="221" cy="41.3" r="5" fill="#8B5CF6"/>
<circle cx="159" cy="41.3" r="5" fill="#8B5CF6"/>
<circle cx="128" cy="95" r="5" fill="#8B5CF6"/>
<circle cx="159" cy="148.7" r="5" fill="#8B5CF6"/>
<circle cx="221" cy="148.7" r="5" fill="#8B5CF6"/>

<text x="190" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1B1F4B">EVENT<tspan fill="#8B5CF6">IFY</tspan></text>
<text x="190" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">Discover. Connect. Grow.</text>
</svg>
